<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Htoo Fuel Station - Tank Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Padauk:wght=400;700&display=swap" rel="stylesheet">
   
    <style>
        html, body {
            max-width: 100%;
            overflow-x: hidden; /* ဖုန်းထဲတွင် ဘေးတိုက်လွတ်ထွက်ခြင်းကို လုံးဝပိတ်ထားသည် */
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Padauk', sans-serif;
            background-color: #f8fafc;
        }
        * {
            box-sizing: border-box;
        }
    </style>
</head>
<body class="p-3 md:p-6 text-gray-800">

    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-sm p-4 md:p-6 mb-5 flex flex-col sm:flex-row items-center gap-4 border-l-8 border-orange-500">
        <img id="stationLogo" src="https://placehold.co/100x100/orange/white?text=HTOO" alt="Logo" class="w-16 h-16 md:w-20 md:h-20 rounded-xl object-cover shadow-sm">
        <div class="text-center sm:text-left">
            <h1 id="stationName" class="text-xl md:text-2xl font-bold text-gray-9xl">Htoo Fuel Station</h1>
            <p id="stationBranch" class="text-gray-500 text-sm md:text-base">ပြင်ဦးလွင်ဘဏ်ခွဲ</p>
            <p id="stationPhone" class="text-gray-400 text-xs md:text-sm">09-123456789</p>
        </div>
    </div>

    <div class="max-w-5xl mx-auto mb-5 flex flex-col sm:flex-row justify-between items-center bg-white p-3 rounded-xl shadow-sm gap-3">
        <h2 class="text-base md:text-lg font-bold text-gray-700 flex items-center gap-2">
            <span class="w-2.5 h-5 bg-orange-500 rounded-full inline-block"></span>
            ဆီတိုင်ကီများ၏ လက်ရှိအခြေအနေ
        </h2>
       
        <div class="flex bg-gray-100 p-1 rounded-lg border border-gray-200">
            <button id="btnGrid" onclick="switchView('grid')" class="px-4 py-1.5 rounded-md text-xs font-bold transition-all bg-white text-orange-600 shadow-sm">
                📱 Grid View
            </button>
            <button id="btnList" onclick="switchView('list')" class="px-4 py-1.5 rounded-md text-xs font-bold transition-all text-gray-500 hover:text-gray-700">
                📄 List View
            </button>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
       
        <div id="loadingText" class="text-center text-gray-400 py-8 text-sm">အချက်အလက်များ ဆွဲယူနေပါသည်...</div>

        <div id="gridViewContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 w-full">
            </div>

        <div id="listViewContainer" class="hidden w-full">
            </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentView = 'grid'; // စစချင်း ပေါ်မည့် View ပုံစံ ('grid' သို့မဟုတ် 'list')
        let globalData = null;    // Socket ကလာသော data ကို မှတ်ထားရန်

        // အစ်ကိုကြီးဗျာ... ခလုတ်နှိပ်လိုက်ရင် ဝှက်တာ/ပြတာ သေချာလုပ်ပေးမည့် လုပ်ဆောင်ချက်ပါဗျာ
        function switchView(view) {
            currentView = view;
            const btnGrid = document.getElementById('btnGrid');
            const btnList = document.getElementById('btnList');
            const gridBox = document.getElementById('gridViewContainer');
            const listBox = document.getElementById('listViewContainer');

            if (view === 'grid') {
                // Button Style ကို Grid ဘက်သို့ အဝါ/လိမ္မော်ရောင် ပြောင်းခြင်း
                btnGrid.className = "px-4 py-1.5 rounded-md text-xs font-bold transition-all bg-white text-orange-600 shadow-sm";
                btnList.className = "px-4 py-1.5 rounded-md text-xs font-bold transition-all text-gray-500 hover:text-gray-700";
               
                // Container ကို ပြောင်းလဲခြင်း
                gridBox.style.display = 'grid';
                listBox.style.display = 'none';
            } else {
                // Button Style ကို List ဘက်သို့ ပြောင်းလဲခြင်း
                btnGrid.className = "px-4 py-1.5 rounded-md text-xs font-bold transition-all text-gray-500 hover:text-gray-700";
                btnList.className = "px-4 py-1.5 rounded-md text-xs font-bold transition-all bg-white text-orange-600 shadow-sm";
               
                // Container ကို ပြောင်းလဲခြင်း
                gridBox.style.display = 'none';
                listBox.style.display = 'block';
            }
           
            // ဒေတာ ရှိပြီးသားဖြစ်လျှင် UI ကို ချက်ချင်း ပြန်ဆွဲပေးပါသည်
            if (globalData) renderUI(globalData);
        }

        // မျက်နှာပြင်တစ်ခုလုံးကို ဒေတာအသစ်ဖြင့် တည်ဆောက်ပြသပေးသည့် ပင်မ Function
        function renderUI(data) {
            globalData = data;
            document.getElementById('loadingText').style.display = 'none';

            // (၁) ဆိုင် Header အချက်အလက်များ ထည့်သွင်းခြင်း
            if (data.station) {
                document.getElementById('stationName').innerText = data.station.name;
                document.getElementById('stationBranch').innerText = data.station.branchName;
                document.getElementById('stationPhone').innerText = data.station.phoneNumber;
                if (data.station.logoUrl) document.getElementById('stationLogo').src = data.station.logoUrl;
            }

            const gridContainer = document.getElementById('gridViewContainer');
            const listContainer = document.getElementById('listViewContainer');
           
            // အဟောင်းများကို လုံးဝ ရှင်းထုတ်ပစ်ပါသည်
            gridContainer.innerHTML = '';
            listContainer.innerHTML = '';

            // (၂) တိုင်ကီတစ်ခုချင်းစီကို Loop ပတ်ပြီး Grid ကတ်ပြားရော၊ List တန်းပါ ဆောက်လုပ်ခြင်း
            data.tanks.forEach(tank => {
                const percentage = Math.min(Math.round((tank.currentLiter / tank.maxCapacity) * 100), 100) || 0;
               
                // ဆီအမျိုးအစားအလိုက် ခွဲခြားပြသမည့် အရောင်များ
                let fuelColor = "bg-gray-700";
                if (tank.fuelType.toLowerCase().includes("92")) fuelColor = "bg-green-600";
                if (tank.fuelType.toLowerCase().includes("95")) fuelColor = "bg-red-600";
                if (tank.fuelType.toLowerCase().includes("diesel") || tank.fuelType.toLowerCase().includes("hsd")) fuelColor = "bg-amber-600";

                // --------------------------------------------------
                // 🎴 (A) GRID VIEW HTML ကတ်ပြားပုံစံ
                // --------------------------------------------------
                const gridCard = document.createElement('div');
                gridCard.className = "bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 flex flex-col justify-between transition-all hover:shadow-md";
                gridCard.innerHTML = `
                    <div class="p-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                        <span class="text-xs font-bold bg-gray-800 text-white px-2.5 py-1 rounded-md">Tank ${tank.tankNumber}</span>
                        <span class="text-xs font-bold text-white px-2.5 py-1 rounded-md ${fuelColor}">${tank.fuelType}</span>
                    </div>
                    <div class="p-4">
                        <div class="flex justify-between text-[11px] text-gray-400 mb-1.5">
                            <span>ဆီပမာဏ (${percentage}%)</span>
                            <span>Max: ${tank.maxCapacity.toLocaleString()} L</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2 overflow-hidden mb-4">
                            <div class="${fuelColor} h-2 rounded-full transition-all duration-500" style="width: ${percentage}%"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="bg-blue-50 p-2 rounded-xl text-center border border-blue-100">
                                <span class="block text-[10px] text-blue-500 font-bold">📏 လက်ရှိ CM</span>
                                <span class="text-sm font-black text-blue-900">${tank.currentCM}</span>
                            </div>
                            <div class="bg-emerald-50 p-2 rounded-xl text-center border border-emerald-100">
                                <span class="block text-[10px] text-emerald-500 font-bold">🛢️ လက်ရှိ လီတာ</span>
                                <span class="text-sm font-black text-emerald-900">${tank.currentLiter.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `;
                gridContainer.appendChild(gridCard);


                // --------------------------------------------------
                // 📄 (B) LIST VIEW HTML အပေါ်အောက် ဇယားပုံစံ
                // --------------------------------------------------
                const listRow = document.createElement('div');
                listRow.className = "bg-white p-3 md:p-4 rounded-xl shadow-sm mb-3 border border-gray-100 flex flex-col md:flex-row md:items-center justify-between gap-3 w-full";
                listRow.innerHTML = `
                    <div class="flex items-center justify-between md:justify-start gap-3 border-b md:border-b-0 pb-2 md:pb-0 border-gray-100 shrink-0">
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold bg-gray-800 text-white px-2.5 py-1.5 rounded-lg">Tank ${tank.tankNumber}</span>
                            <span class="text-xs font-bold text-white px-2.5 py-1.5 rounded-lg ${fuelColor}">${tank.fuelType}</span>
                        </div>
                        <span class="text-sm font-black text-gray-600 md:hidden">${percentage}%</span>
                    </div>

                    <div class="w-full md:flex-1 md:mx-4">
                        <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                            <div class="${fuelColor} h-2.5 rounded-full transition-all duration-500" style="width: ${percentage}%"></div>
                        </div>
                    </div>

                    <div class="flex items-center justify-between md:justify-end gap-2.5 w-full md:w-auto shrink-0">
                        <div class="bg-blue-50 text-blue-900 px-3 py-2 rounded-xl text-xs md:text-sm flex items-center gap-1.5 font-bold border border-blue-100 flex-1 md:flex-none justify-center min-w-[85px]">
                            <span>📏</span> <span>${tank.currentCM} CM</span>
                        </div>
                        <div class="bg-emerald-50 text-emerald-900 px-3 py-2 rounded-xl text-xs md:text-sm flex items-center gap-1.5 font-bold border border-emerald-100 flex-1 md:flex-none justify-center min-w-[135px]">
                            <span>🛢️</span> <span>${tank.currentLiter.toLocaleString()} / ${tank.maxCapacity.toLocaleString()} L</span>
                        </div>
                        <div class="hidden md:block text-right font-black text-gray-600 text-sm min-w-[45px]">
                            <span>${percentage}%</span>
                        </div>
                    </div>
                `;
                listContainer.appendChild(listRow);
            });

            // (၃) လက်ရှိ နှိပ်ထားသော View အလိုက် Display စနစ်ကို နောက်ဆုံးအဆင့်အဖြစ် စစ်ဆေးချုပ်လုပ်ပေးခြင်း
            if (currentView === 'grid') {
                gridContainer.style.display = 'grid';
                listContainer.style.display = 'none';
            } else {
                gridContainer.style.display = 'none';
                listContainer.style.display = 'block';
            }
        }

        // ပထမဆုံးအကြိမ် API မှ ဒေတာလှမ်းယူခြင်း
        fetch('/api/data')
            .then(res => res.json())
            .then(data => renderUI(data))
            .catch(err => console.error("Error loading data:", err));

        // Real-time ဒေတာ အပ်ဒိတ်များ ဝင်လာလျှင် လက်ခံခြင်း
        socket.on('dataUpdate', (data) => {
            renderUI(data);
        });
    </script>
</body>
</html>
