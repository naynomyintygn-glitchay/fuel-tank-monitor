<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Htoo Fuel - Live Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Padauk', sans-serif; background-color: #0f172a; color: white; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        .header { 
            background-color: #1e293b; padding: 20px; border-radius: 15px; 
            border-left: 10px solid #f97316; margin-bottom: 30px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { margin: 0; font-size: 28px; }
        .header p { margin: 5px 0 0 0; color: #94a3b8; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .tank-card { 
            background-color: #1e293b; border-radius: 20px; padding: 20px; 
            border: 1px solid #334155; position: relative; overflow: hidden;
        }
        .tank-name { font-size: 14px; color: #94a3b8; font-weight: bold; text-transform: uppercase; }
        .fuel-type { font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        
        /* Progress Bar */
        .progress-bg { background-color: #0f172a; height: 12px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 1s ease-in-out; }
        
        .stats { display: flex; justify-content: space-between; margin-top: 15px; }
        .val-group { text-align: center; flex: 1; }
        .val-label { font-size: 11px; color: #64748b; display: block; }
        .val-num { font-size: 18px; font-weight: bold; color: #f97316; }

        /* Colors based on fuel */
        .f-92 { background-color: #10b981; } /* Green */
        .f-95 { background-color: #ef4444; } /* Red */
        .f-diesel { background-color: #f59e0b; } /* Orange/Yellow */
        .f-default { background-color: #6366f1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <h1 id="stName">Htoo Fuel Station</h1>
                <p id="stBranch">Loading...</p>
            </div>
            <div style="text-align: right;">
                <div id="liveClock" style="font-size: 18px; font-weight: bold;"></div>
                <p>Live Monitoring</p>
            </div>
        </div>

        <div class="grid" id="tankGrid">
            <!-- Tanks will appear here -->
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleString();
        }
        setInterval(updateClock, 1000);

        function fetchData() {
            fetch('/api/data')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('stName').innerText = data.station.name;
                    document.getElementById('stBranch').innerText = data.station.branchName;

                    const grid = document.getElementById('tankGrid');
                    grid.innerHTML = '';

                    data.tanks.forEach(tank => {
                        const percent = Math.min(Math.round((tank.currentLiter / tank.maxCapacity) * 100), 100) || 0;
                        
                        let colorClass = "f-default";
                        const ft = tank.fuelType.toLowerCase();
                        if (ft.includes("92")) colorClass = "f-92";
                        else if (ft.includes("95")) colorClass = "f-95";
                        else if (ft.includes("diesel") || ft.includes("hsd")) colorClass = "f-diesel";

                        grid.innerHTML += `
                            <div class="tank-card">
                                <div class="tank-name">Tank ${tank.tankNumber}</div>
                                <div class="fuel-type">${tank.fuelType}</div>
                                
                                <div style="display: flex; justify-content: space-between; font-size: 12px;">
                                    <span>Level</span>
                                    <span>${percent}%</span>
                                </div>
                                <div class="progress-bg">
                                    <div class="progress-fill ${colorClass}" style="width: ${percent}%"></div>
                                </div>

                                <div class="stats">
                                    <div class="val-group">
                                        <span class="val-label">လက်ရှိ CM</span>
                                        <span class="val-num">${tank.currentCM}</span>
                                    </div>
                                    <div class="val-group" style="border-left: 1px solid #334155; border-right: 1px solid #334155;">
                                        <span class="val-label">လက်ရှိ လီတာ</span>
                                        <span class="val-num">${Number(tank.currentLiter).toLocaleString()}</span>
                                    </div>
                                    <div class="val-group">
                                        <span class="val-label">အပြည့်ဆံ့</span>
                                        <span class="val-num" style="color:#94a3b8">${Number(tank.maxCapacity).toLocaleString()}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                })
                .catch(err => console.error("Error:", err));
        }

        // ၅ စက္ကန့်တစ်ခါ အလိုအလျောက် Data အသစ်ဆွဲမည်
        setInterval(fetchData, 5000);
        fetchData();
    </script>
</body>
</html>
