<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Htoo Fuel Station - Live Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Padauk:wght=400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for Dynamic Dark/Light Theme Switching */
        :root[data-theme="dark"] {
            --bg-main: #0f172a; --bg-card: #1e293b; --bg-inner: #0f172a;
            --text-main: #f1f5f9; --text-muted: #94a3b8; --border-color: #334155;
            --header-border: #f97316;
        }
        :root[data-theme="light"] {
            --bg-main: #f8f9fa; --bg-card: #ffffff; --bg-inner: #f1f3f5;
            --text-main: #212529; --text-muted: #6c757d; --border-color: #dee2e6;
            --header-border: #007bff;
        }

        * { box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
        html, body { max-width: 100%; overflow-x: hidden; margin: 0; padding: 0; font-family: 'Padauk', sans-serif; background-color: var(--bg-main); color: var(--text-main); }
        body { padding: 15px; }
        .max-container { max-width: 1024px; margin: 0 auto; }
       
        /* 🏢 Header Area Styling */
        .header-card {
            background-color: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: space-between; gap: 20px;
            border-left: 8px solid var(--header-border); box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header-info { display: flex; align-items: center; gap: 20px; }
        .header-logo { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; }
        .header-title { margin: 0; font-size: 22px; font-weight: bold; }
        .header-sub { margin: 3px 0 0 0; font-size: 15px; color: var(--text-muted); }

        /* ⏱️ Last Updated History Bar */
        .history-bar {
            background-color: var(--bg-card); padding: 10px 20px; border-radius: 10px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border-color);
            font-size: 13px; font-weight: bold;
        }
        .history-time { color: #f97316; }

        /* 🎛️ Control Panel (Theme + Layout View Switch) */
        .control-bar {
            background-color: var(--bg-card); padding: 12px 20px; border-radius: 12px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .switch-box { background-color: var(--bg-inner); padding: 4px; border-radius: 8px; display: flex; border: 1px solid var(--border-color); }
        .switch-btn {
            background: none; border: none; padding: 6px 14px; font-size: 12px; font-weight: bold;
            color: var(--text-muted); cursor: pointer; border-radius: 6px;
        }
        .switch-btn.active { background-color: #f97316; color: white; }

        /* 🎴 GRID CYLINDRICAL TANK VIEW */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; width: 100%; }
        .grid-card { background-color: var(--bg-card); border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); display: flex; flex-direction: column; justify-content: space-between; }
        .card-head { background-color: var(--bg-inner); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .card-body { padding: 16px; display: flex; flex-direction: column; align-items: center; }
       
        /* 🛢️ 3D Cylindrical Tank UI Component */
        .tank-wrapper {
            width: 120px; height: 160px; background: #090d16; border: 3px solid #475569;
            border-radius: 20px / 12px; position: relative; overflow: hidden; margin: 15px 0;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .tank-fluid { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; transition: height 0.8s ease-in-out; }
        .tank-pct-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 20px; font-weight: 900; color: #ffffff; text-shadow: 0 2px 5px rgba(0,0,0,1); z-index: 10;
        }

        /* 📄 LIST VIEW LAYOUT */
        .list-layout { display: none; width: 100%; }
        .list-row {
            background-color: var(--bg-card); padding: 14px; border-radius: 12px; margin-bottom: 12px;
            border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; gap: 15px;
        }
        .list-left { display: flex; align-items: center; gap: 10px; min-width: 150px; }
        .list-center { flex: 1; }
        .progress-container { width: 100%; background-color: var(--bg-inner); height: 12px; border-radius: 6px; overflow: hidden; }
        .progress-bar { height: 100%; border-radius: 6px; transition: width 0.8s ease-in-out; }
        .list-right { display: flex; align-items: center; gap: 10px; }

        /* Fuel Dynamic Styling */
        .badge-tank { background-color: #475569; color: white; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .badge-fuel { padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; color: white; min-width: 65px; text-align: center; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 5px; }
        .v-box { padding: 8px; border-radius: 10px; text-align: center; font-size: 13px; border: 1px solid var(--border-color); }
        .v-box-blue { background-color: rgba(30, 58, 138, 0.15); color: #3b82f6; font-weight: bold; }
        .v-box-green { background-color: rgba(6, 78, 59, 0.15); color: #10b981; font-weight: bold; }
        .v-label { display: block; font-size: 10px; opacity: 0.8; margin-bottom: 2px; }

        /* Fuel Type Base Colors */
        .f-92 { background-color: #059669 !important; }       
        .f-95 { background-color: #dc2626 !important; }       
        .f-diesel { background-color: #d97706 !important; }   
        .f-default { background-color: #64748b; }

        @media (max-width: 640px) {
            .header-card { flex-direction: column; text-align: center; }
            .list-row { flex-direction: column; align-items: stretch; gap: 10px; }
            .list-right { justify-content: space-between; }
        }
    </style>
</head>
<body>

    <div class="max-container">
        <div class="header-card">
            <div class="header-info">
                <img id="stationLogo" src="https://placehold.co/100x100/orange/white?text=HTOO" alt="Logo" class="header-logo">
                <div>
                    <h1 id="stationName" class="header-title">Htoo Fuel Station</h1>
                    <p id="stationBranch" class="header-sub">Live Tank Monitoring System</p>
                </div>
            </div>
            <div class="switch-box">
                <button onclick="toggleTheme('light')" id="themeLight" class="switch-btn">☀️ Light</button>
                <button onclick="toggleTheme('dark')" id="themeDark" class="switch-btn active">🌙 Dark</button>
            </div>
        </div>

        <div class="history-bar">
            <span>📊 စနစ်၏ လက်ရှိအခြေအနေ</span>
            <span>နောက်ဆုံးပြင်ဆင်မှု - <span id="lastUpdated" class="history-time">မရှိသေးပါ</span></span>
        </div>

        <div class="control-bar">
            <span style="font-weight: bold;">ဆီတိုင်ကီများ စာရင်း</span>
            <div class="switch-box">
                <button id="btnGrid" onclick="switchView('grid')" class="switch-btn active">🛢️ Cylinder View</button>
                <button id="btnList" onclick="switchView('list')" class="switch-btn">📄 List View</button>
            </div>
        </div>

        <div id="gridViewContainer" class="grid-layout"></div>
        <div id="listViewContainer" class="list-layout"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentView = 'grid';

        function toggleTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeLight').classList.toggle('active', theme === 'light');
            document.getElementById('themeDark').classList.toggle('active', theme === 'dark');
        }

        function switchView(view) {
            currentView = view;
            document.getElementById('btnGrid').classList.toggle('active', view === 'grid');
            document.getElementById('btnList').classList.toggle('active', view === 'list');
            document.getElementById('gridViewContainer').style.display = view === 'grid' ? 'grid' : 'none';
            document.getElementById('listViewContainer').style.display = view === 'list' ? 'block' : 'none';
        }

        function renderUI(data) {
            if(!data) return;
            if(data.lastUpdated) document.getElementById('lastUpdated').innerText = data.lastUpdated;

            const gridContainer = document.getElementById('gridViewContainer');
            const listContainer = document.getElementById('listViewContainer');
            gridContainer.innerHTML = ''; listContainer.innerHTML = '';

            if (data.tanks && data.tanks.length > 0) {
                data.tanks.forEach(tank => {
                    const curLit = parseFloat(String(tank.currentLiter).replace(/,/g, '')) || 0;
                    const maxCap = parseFloat(String(tank.maxCapacity).replace(/,/g, '')) || 30500;
                    const percentage = Math.min(Math.round((curLit / maxCap) * 100), 100) || 0;
                    const displayCM = tank.currentCM || "0";
                   
                    let fuelClass = "f-default";
                    const rawFuelType = tank.fuelType ? String(tank.fuelType).toUpperCase() : "";
                    if (rawFuelType.includes("92")) fuelClass = "f-92";
                    else if (rawFuelType.includes("95")) fuelClass = "f-95";
                    else if (rawFuelType.includes("DIESEL") || rawFuelType.includes("HSD") || rawFuelType.includes("PREMIUM")) fuelClass = "f-diesel";

                    // Cylinder Card UI
                    const gridCard = document.createElement('div');
                    gridCard.className = "grid-card";
                    gridCard.innerHTML = `
                        <div class="card-head">
                            <span class="badge-tank">Tank ${tank.tankNumber}</span>
                            <span class="badge-fuel ${fuelClass}">${tank.fuelType}</span>
                        </div>
                        <div class="card-body">
                            <div style="font-size:11px; color:var(--text-muted); width:100%; display:flex; justify-content:space-between;">
                                <span>အပြည့်ဆံ့ပမာဏ:</span><span>${maxCap.toLocaleString()} L</span>
                            </div>
                            <div class="tank-wrapper">
                                <div class="tank-pct-text">${percentage}%</div>
                                <div class="tank-fluid ${fuelClass}" style="height: ${percentage}%"></div>
                            </div>
                            <div class="data-grid">
                                <div class="v-box v-box-blue"><span class="v-label">📏 လက်ရှိ CM</span><span>${displayCM} cm</span></div>
                                <div class="v-box v-box-green"><span class="v-label">🛢️ လက်ရှိ Liter</span><span>${curLit.toLocaleString()} L</span></div>
                            </div>
                        </div>
                    `;
                    gridContainer.appendChild(gridCard);

                    // List Row UI
                    const listRow = document.createElement('div');
                    listRow.className = "list-row";
                    listRow.innerHTML = `
                        <div class="list-left">
                            <span class="badge-tank">Tank ${tank.tankNumber}</span>
                            <span class="badge-fuel ${fuelClass}">${tank.fuelType}</span>
                            <span style="font-weight:bold;">${percentage}%</span>
                        </div>
                        <div class="list-center">
                            <div class="progress-container"><div class="progress-bar ${fuelClass}" style="width: ${percentage}%"></div></div>
                        </div>
                        <div class="list-right">
                            <div class="v-box v-box-blue" style="padding:4px 10px;"><span>${displayCM} CM</span></div>
                            <div class="v-box v-box-green" style="padding:4px 10px;"><span>${curLit.toLocaleString()} / ${maxCap.toLocaleString()} L</span></div>
                        </div>
                    `;
                    listContainer.appendChild(listRow);
                });
            }
        }

        fetch('/api/data').then(res => res.json()).then(data => renderUI(data)).catch(err => console.error(err));
        socket.on('dataUpdate', (data) => { renderUI(data); });
    </script>
</body>
</html>
