<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Htoo Fuel Station - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Padauk:wght=400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Padauk', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .admin-card {
            background-color: #1e293b; padding: 30px; border-radius: 16px;
            width: 100%; max-width: 450px; border: 1px solid #334155;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }
        h2 { margin-top: 0; color: #ffffff; text-align: center; font-size: 22px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
        input[type="file"] {
            display: block; width: 100%; padding: 10px; background-color: #0f172a;
            border: 1px dashed #475569; border-radius: 8px; color: #94a3b8; cursor: pointer;
        }
        .btn-submit {
            width: 100%; background-color: #f97316; color: white; border: none;
            padding: 12px; font-size: 15px; font-weight: bold; border-radius: 8px;
            cursor: pointer; transition: background 0.2s; margin-top: 10px;
        }
        .btn-submit:hover { background-color: #ea580c; }
        .status-msg { text-align: center; margin-top: 15px; font-size: 13px; font-weight: bold; }
        .status-success { color: #4ade80; }
        .status-error { color: #f87171; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>📊 ဆီတိုင်ကီ ဒေတာတင်ရန် (Admin)</h2>
       
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="form-group">
                <label for="excelFile">Excel ဖိုင် သို့မဟုတ် CSV ဖိုင် ရွေးချယ်ပါ</label>
                <input type="file" id="excelFile" name="excelFile" accept=".xlsx, .xls, .csv" required>
            </div>
            <button type="submit" class="btn-submit">🚀 ဒေတာများကို Live အပ်ဒိတ်လုပ်မည်</button>
        </form>

        <div id="statusMessage" class="status-msg"></div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
           
            const fileInput = document.getElementById('excelFile');
            const statusDiv = document.getElementById('statusMessage');
           
            if (!fileInput.files[0]) {
                statusDiv.className = "status-msg status-error";
                statusDiv.innerText = "ကျေးဇူးပြု၍ ဖိုင်ရွေးချယ်ပေးပါဗျာ။";
                return;
            }

            statusDiv.className = "status-msg";
            statusDiv.style.color = "#94a3b8";
            statusDiv.innerText = "ဖိုင်ကို ပို့ဆောင်နေပါသည်...";

            const formData = new FormData();
            formData.append('excelFile', fileInput.files[0]);

            // Backend Server သို့ Excel ဖိုင်လှမ်းတင်ခြင်း (Endpoint: /api/upload)
            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(res => {
                if (!res.ok) throw new Error('Server တုံ့ပြန်မှု မမှန်ကန်ပါ');
                return res.json();
            })
            .then(data => {
                statusDiv.className = "status-msg status-success";
                statusDiv.innerText = "🎉 အောင်မြင်ပါသည်။ ဆီတိုင်ကီ ဒေတာများကို Real-time ပြောင်းလဲလိုက်ပါပြီဗျာ!";
                fileInput.value = ''; // Clear Form
            })
            .catch(err => {
                console.error("Upload error:", err);
                statusDiv.className = "status-msg status-error";
                statusDiv.innerText = "❌ ဒေတာတင်ခြင်း မအောင်မြင်ပါ။ Server Endpoint သို့မဟုတ် Excel Column များကို စစ်ဆေးပါဗျာ။";
            });
        });
    </script>
</body>
</html>
