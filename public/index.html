<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fuel Tank Real-time Monitor</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* CSS Variables - အလင်း/အမှောင် စနစ်အတွက် */
        :root {
            /* Light Mode (Default) */
            --bg-main: #f0f2f5;
            --bg-header: #ffffff;
            --bg-card: #ffffff;
            --text-main: #1a202c;
            --text-sub: #4a5568;
            --border-card: rgba(0,0,0,0.06);
            --shadow-card: 0 4px 15px rgba(0, 0, 0, 0.05);
            --tank-bg: #f8f9fa;
            --tank-border: #94a3b8;
           
            /* ဆီအမျိုးအစား အရောင်များ */
            --color-hsd: #4b6584;
            --color-premium: #3867d6;
            --color-ron92: #20bf6b;
            --color-ron95: #fa8231;
        }

        /* Dark Mode Properties */
        [data-theme="dark"] {
            --bg-main: #0b0f19;
            --bg-header: #151c2c;
            --bg-card: #151c2c;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --border-card: #232d42;
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.4);
            --tank-bg: #0b0f19;
            --tank-border: #334155;
           
            /* Dark Mode မှာ ဆီအရောင်တွေကို ပိုလင်းအောင် ထားရှိခြင်း */
            --color-hsd: #718093;
            --color-premium: #45aaf2;
            --color-ron92: #26de81;
            --color-ron95: #fd9644;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 12px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Layout */
        .header {
            background: var(--bg-header);
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .station-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .station-logo {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            object-fit: cover;
        }

        .station-name h1 {
            font-size: 18px;
            font-weight: 700;
        }
       
        .station-name p {
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 2px;
        }

        /* ခလုတ်များ ထားရှိရာ နေရာ */
        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover { opacity: 0.9; }
       
        /* Theme Change Button Styling */
        .btn-theme {
            background-color: var(--bg-main);
            color: var(--text-main);
            border: 1px solid var(--border-card);
        }

        /* Grid System (၆ ကွက် စနစ်တကျပေါ်ရန်) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 12px;
            flex-grow: 1;
            height: calc(100vh - 85px);
        }

        /* Tank Card Design */
        .tank-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 14px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-card);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .tank-title {
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            color: var(--text-main);
            border-bottom: 1px dashed var(--border-card);
            padding-bottom: 6px;
        }

        /* ဒေါင်လိုက် ဆီတိုင်ကီပြကွက် */
        .tank-visual-area {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            margin: 10px 0;
        }

        .tank-cylinder {
            width: 100px;
            height: 100%;
            max-height: 140px;
            border: 3px solid var(--tank-border);
            border-radius: 14px;
            position: relative;
            overflow: hidden;
            background: var(--tank-bg);
            box-shadow: inset 0 0 8px rgba(0,0,0,0.1);
        }

        .tank-liquid {
            width: 100%;
            height: 0%; /* Dynamic */
            position: absolute;
            bottom: 0;
            left: 0;
            transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Liter Text Inside Cylinder overlay */
        .liter-overlay {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8), -1px -1px 4px rgba(0, 0, 0, 0.8);
            z-index: 5;
        }

        /* Fuel Fluid Classes */
        .fuel-hsd .tank-liquid { background: var(--color-hsd); }
        .fuel-premium .tank-liquid { background: var(--color-premium); }
        .fuel-92 .tank-liquid { background: var(--color-ron92); }
        .fuel-95 .tank-liquid { background: var(--color-ron95); }

        /* အောက်ခြေစာသား အချက်အလက်များ */
        .tank-details {
            text-align: center;
        }

        .percentage-text {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .sub-info-box {
            font-size: 11px;
            color: var(--text-sub);
            line-height: 1.5;
            background: rgba(0,0,0,0.02);
            padding: 4px;
            border-radius: 6px;
        }
        [data-theme="dark"] .sub-info-box { background: rgba(255,255,255,0.02); }

        .bold-val {
            font-weight: 600;
            color: var(--text-main);
        }

        /* -------------------------------------------
           LIST VIEW MODE STYLING
        ------------------------------------------- */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
            overflow-y: auto;
            height: calc(100vh - 85px);
        }

        .list-row {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 12px 20px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .list-tank-info {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 25%;
        }

        .fuel-indicator-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }
        .fuel-hsd .fuel-indicator-dot { background: var(--color-hsd); }
        .fuel-premium .fuel-indicator-dot { background: var(--color-premium); }
        .fuel-92 .fuel-indicator-dot { background: var(--color-ron92); }
        .fuel-95 .fuel-indicator-dot { background: var(--color-ron95); }

        .list-progress-area {
            width: 40%;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .list-progress-bar-bg {
            flex-grow: 1;
            height: 16px;
            background: var(--tank-bg);
            border: 1px solid var(--tank-border);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .list-progress-fill {
            height: 100%;
            width: 0%;
            transition: width 0.8s ease;
        }
        .fuel-hsd .list-progress-fill { background: var(--color-hsd); }
        .fuel-premium .list-progress-fill { background: var(--color-premium); }
        .fuel-92 .list-progress-fill { background: var(--color-ron92); }
        .fuel-95 .list-progress-fill { background: var(--color-ron95); }

        .list-data-area {
            width: 30%;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="station-info">
            <img id="stationLogo" src="https://placehold.co/100" alt="Station Logo" class="station-logo">
            <div class="station-name">
                <h1 id="stationName">Htoo Fuel Station</h1>
                <p id="stationSub">တိုင်းတာချက်များအား တိုက်ရိုက်ကြည့်ရှုခြင်း</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-theme" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
            <button class="btn" onclick="toggleView()" id="viewBtn">📋 List View သို့ပြောင်းရန်</button>
        </div>
    </div>

    <div class="grid-container" id="tanksGrid"></div>
    <div class="list-container" id="tanksList" style="display: none;"></div>

    <script>
        const socket = io();
        let currentViewMode = "grid"; // grid သို့မဟုတ် list
        let globalData = null;

        // ဆီအမျိုးအစားအလိုက် Class ခွဲခြားခြင်း
        function getFuelClass(type) {
            const t = type.toLowerCase();
            if (t.includes('hsd')) return 'fuel-hsd';
            if (t.includes('premium')) return 'fuel-premium';
            if (t.includes('92')) return 'fuel-92';
            if (t.includes('95')) return 'fuel-95';
            return 'fuel-92';
        }

        // Light/Dark Theme စနစ် ပြောင်းလဲခြင်း Logic
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                document.getElementById('themeBtn').innerHTML = '🌙 Dark Mode';
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeBtn').innerHTML = '☀️ Light Mode';
                localStorage.setItem('theme', 'dark');
            }
        }

        // စတင်ပွင့်ချိန်တွင် သိမ်းဆည်းထားသော Theme ကို ပြန်ယူခြင်း
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeBtn').innerHTML = savedTheme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode';

        // View ပြောင်းလဲခြင်း (Grid View <-> List View)
        function toggleView() {
            const grid = document.getElementById('tanksGrid');
            const list = document.getElementById('tanksList');
            const btn = document.getElementById('viewBtn');

            if (currentViewMode === "grid") {
                currentViewMode = "list";
                grid.style.display = "none";
                list.style.display = "flex";
                btn.innerHTML = "📊 UI View သို့ပြောင်းရန်";
            } else {
                currentViewMode = "grid";
                grid.style.display = "grid";
                list.style.display = "none";
                btn.innerHTML = "📋 List View သို့ပြောင်းရန်";
            }
            if (globalData) updateUI(globalData);
        }

        // UI အား Real-time ဆွဲတင်ခြင်း
        function updateUI(data) {
            globalData = data;
           
            // ဆိုင်အချက်အလက် ထည့်သွင်းခြင်း
            document.getElementById('stationLogo').src = data.station.logoUrl;
            document.getElementById('stationName').textContent = data.station.name;
            document.getElementById('stationSub').textContent = `ဆီဆိုင်ခွဲ - ${data.station.branchName}  |  ဖုန်း - ${data.station.phoneNumber}`;

            const gridContainer = document.getElementById('tanksGrid');
            const listContainer = document.getElementById('tanksList');

            gridContainer.innerHTML = '';
            listContainer.innerHTML = '';

            data.tanks.forEach(tank => {
                const percentage = ((tank.currentLiter / tank.maxCapacity) * 100).toFixed(1);
                const fuelClass = getFuelClass(tank.fuelType);

                // --- ၁။ GRID VIEW CARD ဆွဲခြင်း ---
                const card = document.createElement('div');
                card.className = `tank-card ${fuelClass}`;
                card.innerHTML = `
                    <div class="tank-title">Tank ${tank.tankNumber} - ${tank.fuelType}</div>
                    <div class="tank-visual-area">
                        <div class="tank-cylinder">
                            <div class="tank-liquid" style="height: ${percentage}%"></div>
                            <div class="liter-overlay">${tank.currentLiter.toLocaleString()} L</div>
                        </div>
                    </div>
                    <div class="tank-details">
                        <div class="percentage-text" style="color: var(--color-${fuelClass.split('-')[1]})">${percentage}% ပြည့်နေသည်</div>
                        <div class="sub-info-box">
                            📏 အမြင့်: <span class="bold-val">${tank.currentCM} CM</span><br>
                            🛢️ ဆံ့ဝင်ဆံ့အား: <span class="bold-val">${tank.maxCapacity.toLocaleString()} L</span>
                        </div>
                    </div>
                `;
                gridContainer.appendChild(card);

                // --- ၂။ LIST VIEW ROW ဆွဲခြင်း ---
                const row = document.createElement('div');
                row.className = `list-row ${fuelClass}`;
                row.innerHTML = `
                    <div class="list-tank-info">
                        <div class="fuel-indicator-dot"></div>
                        <div>
                            <strong>Tank ${tank.tankNumber}</strong>
                            <div style="font-size:11px; color:var(--text-sub);">${tank.fuelType}</div>
                        </div>
                    </div>
                    <div class="list-progress-area">
                        <div class="list-progress-bar-bg">
                            <div class="list-progress-fill" style="width: ${percentage}%"></div>
                        </div>
                        <span style="font-size:12px; font-weight:bold; width:45px;">${percentage}%</span>
                    </div>
                    <div class="list-data-area">
                        <div>📏 <span class="bold-val">${tank.currentCM} CM</span></div>
                        <div>🛢️ <span class="bold-val">${tank.currentLiter.toLocaleString()} / ${tank.maxCapacity.toLocaleString()} L</span></div>
                    </div>
                `;
                listContainer.appendChild(row);
            });
        }

        // ပထမဆုံးအကြိမ် ဒေတာဆွဲယူခြင်းနှင့် Socket ချိတ်ဆက်ခြင်း
        fetch('/api/data').then(res => res.json()).then(data => updateUI(data));
        socket.on('dataUpdate', (data) => { updateUI(data); });
    </script>
</body>
</html>
