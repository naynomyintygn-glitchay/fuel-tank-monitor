<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Htoo Fuel Station - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Padauk:wght=400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Padauk', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; padding: 20px; }
        .admin-container { max-width: 700px; margin: 0 auto; background-color: #1e293b; padding: 25px; border-radius: 16px; border: 1px solid #334155; }
        h2 { border-bottom: 2px solid #334155; padding-bottom: 10px; margin-top: 0; }
        .tank-row { display: grid; grid-template-columns: 80px 120px 100px 120px 120px; gap: 10px; margin-bottom: 12px; align-items: center; }
        .form-control { background-color: #0f172a; border: 1px solid #475569; color: white; padding: 8px; border-radius: 6px; width: 100%; }
        .btn-action { background-color: #f97316; color: white; border: none; padding: 12px 20px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; }
        .upload-box { border: 2px dashed #475569; padding: 25px; border-radius: 10px; text-align: center; margin-bottom: 20px; background-color: #0f172a; cursor: pointer; }
        .msg { font-weight: bold; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h2>🛠️ Tank Control Management (Admin)</h2>
       
        <div class="upload-box" onclick="document.getElementById('excelFile').click()">
            <p style="margin:0; font-size:15px;">📊 စာရွက်စာတမ်းဖိုင် (Excel) အား ဤနေရာတွင်နှိပ်၍ တင်ပေးပါ</p>
            <input type="file" id="excelFile" style="display:none" accept=".xlsx, .xls" onchange="uploadExcel()">
        </div>

        <form id="manualForm">
            <div class="tank-row" style="font-weight: bold; font-size: 13px; color: #94a3b8;">
                <div>တိုင်ကီ No</div><div>ဆီအမျိုးအစား</div><div>လက်ရှိ CM</div><div>လက်ရှိ Liter</div><div>ဆံ့ဝင်ဆံ့မှု (Max)</div>
            </div>
           
            <div id="tankInputsContainer">
                </div>

            <button type="button" onclick="saveManualData()" class="btn-action">💾 အချက်အလက်များအားလုံးအား သိမ်းဆည်းမည်</button>
        </form>
        <div id="statusMsg" class="msg"></div>
    </div>

    <script>
        const fuelTypesFallback = ["HSD (Tank 1)", "Premium Diesel (Tank 2)", "92 RON (Tank 3)", "92 RON (Tank 4)", "95 RON (Tank 5)", "92 RON (Tank 6)"];
        const capacitiesFallback = [30500, 30500, 30500, 30500, 15000, 15000];

        function initForm() {
            fetch('/api/data').then(res => res.json()).then(data => {
                const container = document.getElementById('tankInputsContainer');
                container.innerHTML = '';
               
                for(let i=1; i<=6; i++) {
                    const existing = data.tanks ? data.tanks.find(t => t.tankNumber == i) : null;
                    const cm = existing ? existing.currentCM : "0";
                    const liter = existing ? existing.currentLiter : "0";
                    const fType = existing ? existing.fuelType : fuelTypesFallback[i-1];
                    const cap = existing ? existing.maxCapacity : capacitiesFallback[i-1];

                    container.innerHTML += `
                        <div class="tank-row">
                            <input type="number" class="form-control" name="tankNumber" value="${i}" readonly>
                            <input type="text" class="form-control" name="fuelType" value="${fType}">
                            <input type="text" class="form-control" name="currentCM" value="${cm}">
                            <input type="text" class="form-control" name="currentLiter" value="${liter}">
                            <input type="text" class="form-control" name="maxCapacity" value="${cap}">
                        </div>
                    `;
                }
            });
        }

        function saveManualData() {
            const rows = document.querySelectorAll('#tankInputsContainer .tank-row');
            const tanks = [];
            rows.forEach(row => {
                tanks.push({
                    tankNumber: row.querySelector('[name="tankNumber"]').value,
                    fuelType: row.querySelector('[name="fuelType"]').value,
                    currentCM: row.querySelector('[name="currentCM"]').value,
                    currentLiter: row.querySelector('[name="currentLiter"]').value,
                    maxCapacity: row.querySelector('[name="maxCapacity"]').value
                });
            });

            fetch('/api/manual-save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tanks })
            }).then(res => res.json()).then(res => {
                const msg = document.getElementById('statusMsg');
                msg.style.color = "#4ade80"; msg.innerText = "🎉 အချက်အလက်များအား ကွက်တိ Live ပြောင်းလဲသိမ်းဆည်းပြီးပါပြီဗျာ။";
                initForm();
            });
        }

        function uploadExcel() {
            const fileInput = document.getElementById('excelFile');
            if(!fileInput.files[0]) return;

            const formData = new FormData();
            formData.append('excelFile', fileInput.files[0]);

            document.getElementById('statusMsg').style.color = "#94a3b8";
            document.getElementById('statusMsg').innerText = "Excel ဖိုင်တွက်ချက်မှုကို ဆောင်ရွက်နေပါသည်...";

            fetch('/api/excel-upload', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                document.getElementById('statusMsg').style.color = "#4ade80";
                document.getElementById('statusMsg').innerText = "🎉 Excel ဖိုင်အတွင်းရှိ Sheet တိုင်း၏ နောက်ဆုံးစာကြောင်း Row အချက်အလက်များကို အောင်မြင်စွာ ဖတ်ရှုတွက်ချက်ပြီးပါပြီဗျာ။";
                initForm();
            }).catch(err => {
                document.getElementById('statusMsg').style.color = "#f87171";
                document.getElementById('statusMsg').innerText = "❌ အမှားအယွင်းဖြစ်သွားပါသည်။ ဖိုင်ပုံစံကို စစ်ဆေးပါ။";
            });
        }

        window.onload = initForm;
    </script>
</body>
</html>
