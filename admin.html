<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Htoo Fuel - Admin Panel</title>
    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap)" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --accent: #f97316;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Padauk', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9; 
            min-height: 100vh;
            padding: 20px; 
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.hidden { display: none; }
        
        .modal-box {
            background: linear-gradient(145deg, #1e293b, #334155);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid #475569;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 380px;
            width: 90%;
        }
        .modal-box h2 { color: #f97316; margin-bottom: 10px; font-size: 22px; }
        .modal-box p { color: #94a3b8; margin-bottom: 25px; font-size: 13px; }
        .modal-box input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #475569;
            background: #0f172a;
            color: white;
            font-size: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        .modal-box input:focus { outline: none; border-color: #f97316; }
        .modal-box button {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .error-msg { color: #ef4444; margin-top: 15px; font-size: 13px; }
        
        /* Admin Content */
        .admin-content.hidden { display: none; }
        
        .admin-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 20px 25px;
            border-radius: 16px;
            border-left: 5px solid #f97316;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .admin-header h1 { color: #f97316; font-size: 20px; }
        .admin-header a { color: #94a3b8; text-decoration: none; font-size: 13px; }
        .admin-header a:hover { color: white; }
        
        /* Section */
        .section {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .section-title {
            color: #f97316;
            font-size: 14px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #334155;
        }
        
        /* Form */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 12px; color: #94a3b8; }
        .form-control {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            font-size: 13px;
        }
        .form-control:focus { outline: none; border-color: #f97316; }
        
        /* Tank Table */
        .tank-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .tank-table th {
            text-align: left;
            padding: 10px;
            background: #0f172a;
            color: #94a3b8;
            font-size: 11px;
        }
        .tank-table td { padding: 8px 10px; border-bottom: 1px solid #1e293b; }
        .tank-table input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #1e293b;
            color: white;
            font-size: 12px;
        }
        .tank-table input:focus { outline: none; border-color: #f97316; }
        .tank-table input[readonly] { background: #0f172a; color: #64748b; }
        
        /* Buttons */
        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); }
        
        .btn-row { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
        
        /* Upload */
        .upload-box {
            border: 2px dashed #475569;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            background: #0f172a;
            transition: all 0.3s;
        }
        .upload-box:hover { border-color: #f97316; }
        .upload-box input { display: none; }
        .upload-box p { color: #94a3b8; margin: 0; font-size: 13px; }
        .upload-box .icon { font-size: 32px; margin-bottom: 8px; }
        
        /* Status */
        .status-msg {
            padding: 12px 18px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 13px;
            text-align: center;
        }
        .status-msg.success { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid #22c55e; }
        .status-msg.error { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid #ef4444; }
        .status-msg.info { background: rgba(59,130,246,0.15); color: #3b82f6; border: 1px solid #3b82f6; }
        .status-msg.hidden { display: none; }
        
        .excel-row { display: flex; gap: 12px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        .excel-row select {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .tank-table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>

    <!-- Password Modal -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal-box">
            <h2>🔐 Admin Login</h2>
            <p>Password ရိုက်ထည့်ပါ</p>
            <input type="password" id="passwordInput" placeholder="Password" onkeypress="if(event.key==='Enter')verifyPassword()">
            <button onclick="verifyPassword()">ဝင်ရောက်မည်</button>
            <div class="error-msg" id="passwordError"></div>
        </div>
    </div>

    <!-- Admin Content -->
    <div class="container admin-content hidden" id="adminContent">
        <div class="admin-header">
            <h1>🛠️ Admin Panel</h1>
            <a href="/index.html">← Monitor သို့ ပြန်သွားမည်</a>
        </div>

        <!-- Station Settings -->
        <div class="section">
            <div class="section-title">🏢 ဆိုင်အချက်အလက်</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>ဆိုင်နာမည်</label>
                    <input type="text" id="inputStationName" class="form-control">
                </div>
                <div class="form-group">
                    <label>ဆိုင်ခွဲ</label>
                    <input type="text" id="inputBranchName" class="form-control">
                </div>
                <div class="form-group">
                    <label>ဖုန်းနံပါတ်</label>
                    <input type="text" id="inputPhone" class="form-control">
                </div>
                <div class="form-group">
                    <label>Logo URL</label>
                    <input type="text" id="inputLogoUrl" class="form-control">
                </div>
            </div>
        </div>

        <!-- Tank Edit -->
        <div class="section">
            <div class="section-title">🛢️ တိုင်ကီများ ပြင်ဆင်ရန်</div>
            <div style="overflow-x: auto;">
                <table class="tank-table">
                    <thead>
                        <tr>
                            <th style="width:50px">Tank</th>
                            <th style="width:120px">ဆီအမျိုးအစား</th>
                            <th style="width:80px">CM</th>
                            <th style="width:100px">Liter</th>
                            <th style="width:100px">Max</th>
                        </tr>
                    </thead>
                    <tbody id="tankTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" onclick="saveAllData()">💾 သိမ်းဆည်းမည်</button>
        </div>

        <!-- Excel Upload -->
        <div class="section" style="margin-top: 20px;">
            <div class="section-title">📊 Excel Auto Import</div>
            
            <div class="excel-row">
                <label style="color:#94a3b8; font-size: 12px;">Tank:</label>
                <select id="excelTankSelect">
                    <option value="all">အားလုံး (Auto Detect)</option>
                    <option value="1">Tank 1</option>
                    <option value="2">Tank 2</option>
                    <option value="3">Tank 3</option>
                    <option value="4">Tank 4</option>
                    <option value="5">Tank 5</option>
                    <option value="6">Tank 6</option>
                </select>
            </div>
            
            <div class="upload-box" onclick="document.getElementById('excelFile').click()">
                <div class="icon">📁</div>
                <p>Excel (.xlsx) ဖိုင် ရွေးပါ</p>
                <p style="font-size:11px; color:#64748b; margin-top:5px;">Auto-correct: မှားနေသော data များကို အလိုအလျောက် ပြင်ပေးမည်</p>
                <input type="file" id="excelFile" accept=".xlsx,.xls" onchange="uploadExcel()">
            </div>
        </div>

        <div class="status-msg hidden" id="statusMsg"></div>
    </div>

    <script>
        const socket = io();
        let adminPassword = '';

        function verifyPassword() {
            const password = document.getElementById('passwordInput').value;
            fetch('/api/verify-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    adminPassword = password;
                    document.getElementById('passwordModal').classList.add('hidden');
                    document.getElementById('adminContent').classList.remove('hidden');
                    loadCurrentData();
                } else {
                    document.getElementById('passwordError').innerText = 'Password မှားနေပါသည်';
                }
            });
        }

        function loadCurrentData() {
            fetch('/api/data')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('inputStationName').value = data.station.name || '';
                    document.getElementById('inputBranchName').value = data.station.branchName || '';
                    document.getElementById('inputPhone').value = data.station.phoneNumber || '';
                    document.getElementById('inputLogoUrl').value = data.station.logoUrl || '';

                    const tbody = document.getElementById('tankTableBody');
                    tbody.innerHTML = '';
                    
                    const defaultFuels = ["HSD", "Premium Diesel", "92 RON", "92 RON", "95 RON", "92 RON"];
                    const defaultMax = [30500, 30500, 30500, 30500, 15000, 15000];

                    for (let i = 1; i <= 6; i++) {
                        const tank = data.tanks ? data.tanks.find(t => t.tankNumber == i) : null;
                        tbody.innerHTML += `
                            <tr>
                                <td><input type="text" name="tankNumber" value="${i}" readonly></td>
                                <td><input type="text" name="fuelType" value="${tank ? tank.fuelType : defaultFuels[i-1]}"></td>
                                <td><input type="text" name="currentCM" value="${tank ? tank.currentCM : '0'}"></td>
                                <td><input type="text" name="currentLiter" value="${tank ? tank.currentLiter : '0'}"></td>
                                <td><input type="text" name="maxCapacity" value="${tank ? tank.maxCapacity : defaultMax[i-1]}"></td>
                            </tr>
                        `;
                    }
                });
        }

        function saveAllData() {
            const rows = document.querySelectorAll('#tankTableBody tr');
            const tanks = [];
            rows.forEach(row => {
                tanks.push({
                    tankNumber: row.querySelector('[name="tankNumber"]').value,
                    fuelType: row.querySelector('[name="fuelType"]').value,
                    currentCM: row.querySelector('[name="currentCM"]').value,
                    currentLiter: row.querySelector('[name="currentLiter"]').value,
                    maxCapacity: row.querySelector('[name="maxCapacity"]').value
                });
            });

            const stationData = {
                name: document.getElementById('inputStationName').value,
                branchName: document.getElementById('inputBranchName').value,
                phoneNumber: document.getElementById('inputPhone').value,
                logoUrl: document.getElementById('inputLogoUrl').value
            };

            fetch('/api/manual-save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ station: stationData, tanks, password: adminPassword })
            })
            .then(res => res.json())
            .then(data => {
                showStatus(data.success, data.success ? '🎉 သိမ်းဆည်းပြီးပါပြီ!' : '❌ ' + (data.message || 'Error'));
                if (data.success) loadCurrentData();
            })
            .catch(() => showStatus(false, '❌ Error'));
        }

        function uploadExcel() {
            const fileInput = document.getElementById('excelFile');
            if (!fileInput.files[0]) return;

            const formData = new FormData();
            formData.append('excelFile', fileInput.files[0]);
            formData.append('password', adminPassword);
            formData.append('tankNumber', document.getElementById('excelTankSelect').value);

            showStatus(null, '⏳ Excel ဖိုင် Auto-correct လုပ်ပြီး တွက်ချက်နေပါသည်...');

            fetch('/api/excel-upload', { method: 'POST', body: formData })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        let msg = '🎉 Excel Import အောင်မြင်ပါပြီ!';
                        if (data.log && data.log.length > 0) {
                            msg += '\n' + data.log.join('\n');
                        }
                        showStatus(true, msg);
                        loadCurrentData();
                    } else {
                        showStatus(false, '❌ ' + (data.message || 'Error'));
                    }
                    fileInput.value = '';
                })
                .catch(() => {
                    showStatus(false, '❌ Error');
                    fileInput.value = '';
                });
        }

        function showStatus(success, message) {
            const el = document.getElementById('statusMsg');
            el.classList.remove('hidden', 'success', 'error', 'info');
            if (success === null) {
                el.classList.add('info');
            } else {
                el.classList.add(success ? 'success' : 'error');
            }
            el.innerText = message;
        }

        socket.on('dataUpdate', () => {
            if (!document.getElementById('adminContent').classList.contains('hidden')) {
                loadCurrentData();
            }
        });
    </script>
</body>
</html>
