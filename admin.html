<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Htoo Fuel - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Padauk', sans-serif; background-color: #0f172a; color: #f1f5f9; padding: 20px; }
        .admin-container { max-width: 800px; margin: 0 auto; background-color: #1e293b; padding: 25px; border-radius: 16px; border: 1px solid #334155; }
        .section-box { background-color: #0f172a; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .form-control { background-color: #1e293b; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        .tank-row { display: grid; grid-template-columns: 70px 140px 100px 120px 120px; gap: 10px; margin-bottom: 12px; }
        .btn-action { background-color: #f97316; color: white; border: none; padding: 12px 20px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h2>🛠️ Admin Panel</h2>
        <div class="section-box">
            <input type="text" id="inputStationName" class="form-control" placeholder="Station Name">
            <input type="text" id="inputBranchName" class="form-control" placeholder="Branch Name">
        </div>
        <div class="section-box">
            <p>📁 Excel (.xlsx) တင်ရန်</p>
            <input type="file" id="excelFile" onchange="uploadExcel()">
        </div>
        <div class="section-box" id="tankInputsContainer"></div>
        <button onclick="saveAllAdminData()" class="btn-action">💾 သိမ်းဆည်းမည်</button>
    </div>

    <script>
        function loadCurrentSettings() {
            fetch('/api/data').then(res => res.json()).then(data => {
                document.getElementById('inputStationName').value = data.station.name;
                document.getElementById('inputBranchName').value = data.station.branchName;
                const container = document.getElementById('tankInputsContainer');
                container.innerHTML = '';
                data.tanks.forEach(t => {
                    container.innerHTML += `
                        <div class="tank-row">
                            <input type="number" class="form-control" name="tankNumber" value="${t.tankNumber}" readonly>
                            <input type="text" class="form-control" name="fuelType" value="${t.fuelType}">
                            <input type="text" class="form-control" name="currentCM" value="${t.currentCM}">
                            <input type="text" class="form-control" name="currentLiter" value="${t.currentLiter}">
                            <input type="text" class="form-control" name="maxCapacity" value="${t.maxCapacity}">
                        </div>`;
                });
            });
        }
        function saveAllAdminData() {
            const tanks = [];
            document.querySelectorAll('.tank-row').forEach(row => {
                tanks.push({
                    tankNumber: row.querySelector('[name="tankNumber"]').value,
                    fuelType: row.querySelector('[name="fuelType"]').value,
                    currentCM: row.querySelector('[name="currentCM"]').value,
                    currentLiter: row.querySelector('[name="currentLiter"]').value,
                    maxCapacity: row.querySelector('[name="maxCapacity"]').value
                });
            });
            fetch('/api/manual-save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ station: { name: document.getElementById('inputStationName').value, branchName: document.getElementById('inputBranchName').value }, tanks })
            }).then(() => alert("Saved!"));
        }
        function uploadExcel() {
            const formData = new FormData();
            formData.append('excelFile', document.getElementById('excelFile').files[0]);
            fetch('/api/excel-upload', { method: 'POST', body: formData }).then(() => { alert("Excel Updated!"); loadCurrentSettings(); });
        }
        window.onload = loadCurrentSettings;
    </script>
</body>
</html>
